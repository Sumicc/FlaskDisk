<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>📁 Disk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="msg" class="msg"></div>

    <div id="app">
        <!-- 顶部导航 -->
        <div class="top-bar">
            <span class="top-bar-title" id="pageTitle">📁 Disk</span>
            <div class="top-bar-actions" id="topBarActions">
                <button id="sharesBtn" class="top-bar-btn" title="我的分享">📤</button>
                <button id="themeToggle" class="top-bar-btn">🌙</button>
            </div>
        </div>

        <!-- 内容区域 -->
        <div class="content-container" id="contentContainer">
            <!-- 动态内容将在这里渲染 -->
        </div>
    </div>

    <!-- 新建文件夹弹窗 -->
    <div id="mkdirModal" class="modal">
        <div class="modal-content">
            <h3>📁 新建文件夹</h3>
            <form id="mkdirForm">
                <input type="hidden" id="mkdirPath" value="">
                <input type="text" name="folder_name" placeholder="文件夹名称" required>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="modal.hide('mkdirModal')">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 上传文件弹窗 -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3>📤 上传文件</h3>
            <form id="uploadForm" enctype="multipart/form-data">
                <input type="hidden" id="uploadPath" value="">
                <div class="drop-zone" id="dropZone">
                    <input type="file" name="files" id="fileInput" multiple>
                    <p>� 点击或拖拽文件到此处</p>
                </div>
                <div id="selectedFiles"></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="modal.hide('uploadModal')">取消</button>
                    <button type="submit" class="btn btn-primary" id="uploadSubmitBtn">上传</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 重命名弹窗 -->
    <div id="renameModal" class="modal">
        <div class="modal-content">
            <h3>✏️ 重命名</h3>
            <form id="renameForm">
                <input type="hidden" id="renamePath" value="">
                <input type="hidden" id="renameOldName" value="">
                <input type="text" id="renameNewName" name="new_name" placeholder="新名称" required>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="modal.hide('renameModal')">取消</button>
                    <button type="submit" class="btn btn-primary">确定</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 分享弹窗 -->
    <div id="shareModal" class="modal">
        <div class="modal-content">
            <h3>🔗 创建分享</h3>
            <form id="shareForm">
                <input type="hidden" id="sharePath" value="">
                <input type="hidden" id="shareFilename" value="">
                <p id="shareFileDisplay"></p>
                <label>有效期：</label>
                <select id="shareExpire">
                    <option value="1">1天</option>
                    <option value="7" selected>7天</option>
                    <option value="30">30天</option>
                    <option value="365">1年</option>
                </select>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="modal.hide('shareModal')">取消</button>
                    <button type="submit" class="btn btn-primary" id="createShareBtn">创建分享</button>
                </div>
            </form>
            <div id="shareResult" class="share-result" style="display: none;">
                <input type="text" id="shareUrl" readonly>
                <button type="button" class="btn btn-primary" onclick="copyShareUrl()">📋 复制链接</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/router.js') }}"></script>
</body>
</html>
